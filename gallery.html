<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | BAFT</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

<header class="site-header">
  <div class="container nav-wrap">
    <a href="index.html" class="brand">
      <img src="assets/img/baft-logo.svg" class="brand-logo">
      <div>
        <strong>BAFT</strong>
        <span>Building a Better Future Together</span>
      </div>
    </a>

    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="how-we-work.html">How We Work</a>
      <a href="gallery.html" class="active">Gallery</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<main>

<section class="page-intro">
  <div class="container narrow">
    <span class="eyebrow">Gallery</span>
    <h1 class="section-title">Our work in pictures</h1>
    <p class="section-lead">
      A visual look at BAFT projects, community work and training activity.
    </p>
  </div>
</section>

<section class="section">
  <div class="container">

    <div class="gallery-filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="community">Community</button>
      <button class="filter-btn" data-filter="build">Build</button>
      <button class="filter-btn" data-filter="training">Training</button>
    </div>

    <div class="gallery-grid">

      <div class="gallery-card" data-category="community"><img src="assets/img/gallery/project1.jpg"></div>
      <div class="gallery-card" data-category="build"><img src="assets/img/gallery/project2.jpg"></div>
      <div class="gallery-card" data-category="build"><img src="assets/img/gallery/project3.jpg"></div>
      <div class="gallery-card" data-category="build"><img src="assets/img/gallery/project4.jpg"></div>

      <div class="gallery-card" data-category="build"><img src="assets/img/gallery/whatsapp1.jpg"></div>
      <div class="gallery-card" data-category="build"><img src="assets/img/gallery/whatsapp2.jpg"></div>
      <div class="gallery-card" data-category="build"><img src="assets/img/gallery/whatsapp3.jpg"></div>
      <div class="gallery-card" data-category="build"><img src="assets/img/gallery/whatsapp4.jpg"></div>
      <div class="gallery-card" data-category="build"><img src="assets/img/gallery/whatsapp5.jpg"></div>
      <div class="gallery-card" data-category="build"><img src="assets/img/gallery/whatsapp6.jpg"></div>

      <div class="gallery-card" data-category="training"><img src="assets/img/gallery/whatsapp7.jpg"></div>
      <div class="gallery-card" data-category="training"><img src="assets/img/gallery/whatsapp8.jpg"></div>

      <div class="gallery-card" data-category="community"><img src="assets/img/gallery/whatsapp9.jpg"></div>
      <div class="gallery-card" data-category="community"><img src="assets/img/gallery/whatsapp10.jpg"></div>

      <div class="gallery-card" data-category="build"><img src="assets/img/gallery/whatsapp11.jpg"></div>
      <div class="gallery-card" data-category="build"><img src="assets/img/gallery/whatsapp12.jpg"></div>
      <div class="gallery-card" data-category="build"><img src="assets/img/gallery/whatsapp13.jpg"></div>
      <div class="gallery-card" data-category="build"><img src="assets/img/gallery/whatsapp14.jpg"></div>
      <div class="gallery-card" data-category="build"><img src="assets/img/gallery/whatsapp15.jpg"></div>

    </div>

  </div>
</section>

</main>

<div class="lightbox" id="lightbox">
  <span class="close">&times;</span>
  <img class="lightbox-img" id="lightbox-img">
</div>

<script src="assets/js/gallery.js"></script>

</body>
</html>
